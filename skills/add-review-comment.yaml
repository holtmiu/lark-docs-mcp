name: add-review-comment
version: 0.1.0
title: Add Review Comment
description: Add a review comment to a Feishu/Lark document, using dry-run by default.
capabilities:
  - doc.comment.create
  - doc.permission.check
write: true
inputs:
  type: object
  required: [input, content]
  properties:
    input:
      type: string
      minLength: 1
      maxLength: 2048
      description: Feishu/Lark document URL or token.
    content:
      type: string
      minLength: 1
      maxLength: 20000
    operationId:
      type: string
      maxLength: 128
      description: Required by the executor when dryRun is false.
steps:
  - tool: feishu_doc_check_permission
    args:
      input: "${input}"
  - tool: feishu_doc_create_comment
    args:
      input: "${input}"
      content: "${content}"
      operationId: "${operationId}"
outputs:
  type: object
